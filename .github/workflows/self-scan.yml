name: Self-Scan

# Caspian scans its own source code every push/PR and uploads SARIF to the
# GitHub Code Scanning tab. Dogfooding: if we introduce a regression in our
# own extension that our own rules would catch, the build fails.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # required for upload-sarif

jobs:
  self-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      # Scan our own src/ tree. F11 (multi-line context awareness) landed in
      # v9.5.0, so contextAware rules now correctly skip matches inside
      # multi-line template literals and block comments — the build is back
      # to gating on Error-severity findings.
      #
      # Four directories are excluded by design:
      #   src/__tests__    — intentional vulnerable code fixtures used to assert
      #                      that rules fire.
      #   src/rules        — rule patterns themselves, indistinguishable from
      #                      real bad code via regex.
      #   src/cli          — CLI tools legitimately accept paths from process.argv
      #                      and write to them; TAINT003 (correctly) flags fs-sink-
      #                      with-tainted-path. Different threat model than a web
      #                      app — the user owns their own shell.
      #   src/codeActions  — quick-fix definitions literally contain string forms
      #                      of the dangerous code each rule detects (e.g. the
      #                      JWT002 fix references `jwt.verify(token, key)`). Not
      #                      runnable code — it's fix metadata.
      - name: Caspian self-scan
        run: node out/cli/scan.js . --format sarif --output caspian-self-scan.sarif --fail-on error --exclude out,node_modules,.git,coverage,.github,__tests__,rules,cli,codeActions

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: caspian-self-scan.sarif
          category: caspian-self-scan

      - name: Archive SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: caspian-self-scan.sarif
          path: caspian-self-scan.sarif
          retention-days: 30

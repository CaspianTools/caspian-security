name: Self-Scan

# Caspian scans its own source code every push/PR and uploads SARIF to the
# GitHub Code Scanning tab. Dogfooding: if we introduce a regression in our
# own extension that our own rules would catch, the build fails.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # required for upload-sarif

jobs:
  self-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      # Scan our own src/ tree. --fail-on=error so warnings/infos inform but
      # don't block the build; an Error-severity finding in our own source
      # is a release blocker.
      - name: Caspian self-scan
        run: node out/cli/scan.js . --format sarif --output caspian-self-scan.sarif --fail-on error --exclude out,node_modules,.git,coverage,.github

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: caspian-self-scan.sarif
          category: caspian-self-scan

      - name: Archive SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: caspian-self-scan.sarif
          path: caspian-self-scan.sarif
          retention-days: 30
